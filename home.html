<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="21600">
<link rel="manifest" href="/nodes/manifest.json">
<title>Home — Nodes</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d1117;
    color:#c9d1d9;
    font-family:monospace;
    font-size:14px;
    min-height:100vh;
  }

  /* MENU FIXO — cole este bloco em toda página de node (ajustando os href relativos)
     assim toda página ganha navegação e volta para a Home. */
  .menu {
    position:fixed;
    top:0; left:0; right:0;
    background:#161b22;
    border-bottom:1px solid #30363d;
    display:flex;
    align-items:center;
    padding:0 8px;
    height:38px;
    z-index:999;
    gap:4px;
  }
  .menu a {
    color:#c9d1d9;
    text-decoration:none;
    padding:5px 9px;
    border-radius:4px;
    font-size:12px;
    white-space:nowrap;
    border:1px solid transparent;
  }
  .menu a:hover { border-color:#30363d; color:#58a6ff; }
  .menu a.active {
    background:#1f6feb22;
    border-color:#1f6feb;
    color:#58a6ff;
  }
  .menu-hora {
    margin-left:auto;
    color:#58a6ff;
    font-size:13px;
    font-weight:bold;
    white-space:nowrap;
    padding-right:4px;
  }

  /* NODES DROPDOWN */
  .dropdown { position:relative; }
  .dropdown-btn {
    color:#c9d1d9;
    padding:5px 9px;
    border-radius:4px;
    font-size:12px;
    white-space:nowrap;
    border:1px solid transparent;
    background:none;
    cursor:pointer;
    font-family:monospace;
  }
  .dropdown-btn:hover { border-color:#30363d; color:#58a6ff; }
  .dropdown-menu {
    display:none;
    position:absolute;
    top:34px; left:0;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:6px;
    min-width:170px;
    z-index:1000;
    overflow:hidden;
  }
  .dropdown-menu a {
    display:block;
    padding:8px 12px;
    border-bottom:1px solid #21262d;
    border-radius:0;
  }
  .dropdown-menu a:last-child { border-bottom:none; }
  .dropdown-menu a:hover { background:#21262d; color:#58a6ff; }
  .dropdown.open .dropdown-menu { display:block; }

  /* CONTEÚDO */
  .content { padding:46px 8px 8px; }

  .card {
    background:#161b22;
    border:1px solid #30363d;
    border-radius:6px;
    padding:8px 10px;
    margin-bottom:8px;
  }
  .small { font-size:11px; color:#8b949e; }
  .green { color:#3fb950; }
  .red { color:#f85149; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  /* CLIMA — faixa única e estreita */
  .clima-row {
    display:flex;
    align-items:center;
    gap:14px;
    overflow-x:auto;
    white-space:nowrap;
    font-size:12px;
  }
  .clima-row .temp { font-size:18px; font-weight:bold; color:#e6edf3; }
  .clima-row .sep { color:#30363d; }
  .clima-row .prox { color:#8b949e; }
  .clima-row .prox b { color:#c9d1d9; }

  /* RADIO — faixa única */
  .radio-row {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .radio-dot {
    display:inline-block;
    width:7px; height:7px;
    border-radius:50%;
    background:#8b949e;
    flex-shrink:0;
  }
  .radio-dot.tocando { background:#3fb950; animation:pulse 2s infinite; }
  .radio-dot.erro { background:#f85149; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .radio-nome { font-size:12px; color:#e6edf3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; }
  .radio-controles { display:flex; gap:5px; margin-left:auto; }
  .btn {
    background:#21262d;
    border:1px solid #30363d;
    color:#c9d1d9;
    padding:5px 10px;
    border-radius:4px;
    cursor:pointer;
    font-family:monospace;
    font-size:12px;
  }
  .btn:active { background:#30363d; }
  .btn-play { border-color:#3fb950; color:#3fb950; font-weight:bold; }
  .btn-play.tocando { background:#1f6feb; border-color:#388bfd; color:#fff; }
  .select-radio {
    background:#21262d;
    border:1px solid #30363d;
    color:#c9d1d9;
    padding:4px 6px;
    border-radius:4px;
    font-family:monospace;
    font-size:11px;
    max-width:140px;
  }

  /* CRIPTO */
  .card-title {
    color:#58a6ff;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:8px;
  }
  .crypto-row {
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px solid #21262d;
    font-size:13px;
  }
  .crypto-row:last-child { border-bottom:none; }

  /* NOTICIAS */
  .select-news {
    background:#21262d;
    border:1px solid #30363d;
    color:#c9d1d9;
    padding:5px;
    border-radius:4px;
    font-family:monospace;
    font-size:11px;
    width:100%;
    margin-bottom:6px;
  }
  .news-item {
    border-bottom:1px solid #21262d;
    padding:6px 0;
    font-size:12px;
    line-height:1.5;
  }
  .news-item:last-child { border-bottom:none; }
  .news-item a { color:#c9d1d9; text-decoration:none; }
  .news-item a:hover { color:#58a6ff; }
  .news-source { font-size:10px; color:#8b949e; margin-bottom:2px; }
</style>
</head>
<body>

<!-- MENU: Nodes | Home | Principal ....... Hora -->
<nav class="menu">
  <div class="dropdown" id="dd-nodes">
    <button class="dropdown-btn" onclick="toggleDD('dd-nodes')">Nodes ▾</button>
    <div class="dropdown-menu">
      <a href="index.html">📡 Hub Central</a>
      <a href="xt1033.html">📱 XT1033</a>
      <a href="t395.html">📱 T395</a>
      <a href="a02s.html">📱 A02S</a>
      <a href="daninote.html">🖥️ DANINOTE</a>
      <a href="i3win.html">🖥️ I3WIN</a>
      <a href="hpwin.html">🖥️ HPWIN</a>
      <a href="winceleron.html">🖥️ WIN-CELERON</a>
    </div>
  </div>
  <a href="home.html" class="active">🏠 Home</a>
  <a href="https://rene-dashboard.github.io/">⚡ Principal</a>
  <span class="menu-hora" id="hora">--:--:--</span>
</nav>

<!-- CONTEÚDO -->
<div class="content">

  <!-- CLIMA — faixa única -->
  <div class="card">
    <div class="clima-row" id="clima-row">
      <span class="temp" id="temp">--°C</span>
      <span class="sep">|</span>
      <span id="clima-desc">carregando...</span>
      <span class="sep">|</span>
      <span id="clima-vento">💨 --</span>
      <span class="sep">|</span>
      <span id="clima-umidade">💧 --</span>
      <span class="sep">|</span>
      <span class="prox" id="clima-horas"></span>
    </div>
  </div>

  <!-- RADIO — faixa única -->
  <div class="card">
    <div class="radio-row">
      <span class="radio-dot" id="radio-dot"></span>
      <span class="radio-nome" id="radio-nome">carregando...</span>
      <select class="select-radio" id="select-radio" onchange="trocarPorSelect(this.value)"></select>
      <div class="radio-controles">
        <button class="btn" onclick="anterior()">⏮</button>
        <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="btn" onclick="proxima()">⏭</button>
      </div>
    </div>
    <audio id="radio" preload="none"></audio>
  </div>

  <!-- CRIPTO + NOTICIAS -->
  <div class="grid2">

    <div class="card">
      <div class="card-title">💰 Cripto (USD)</div>
      <div id="crypto-container"><div class="small">carregando...</div></div>
    </div>

    <div class="card">
      <div class="card-title">📰 Notícias pt-BR</div>
      <select class="select-news" id="select-news" onchange="trocarFeedNoticias(this.value)">
        <option value="g1">🇧🇷 G1 — Geral</option>
        <option value="tecnologia">💻 G1 — Tecnologia</option>
        <option value="agenciabrasil">🇧🇷 Agência Brasil</option>
        <option value="cnnbrasil">🇧🇷 CNN Brasil</option>
      </select>
      <div id="news-container"><div class="small">carregando...</div></div>
    </div>

  </div>

</div><!-- fim content -->

<script>
// ─── CONFIG ──────────────────────────────────────────────
const LAT = -23.55;
const LON = -46.63;

const ESTACOES = [
  { nome:'Radio Paradise Rock',    qualidade:'MP3 128kbps', url:'http://stream.radioparadise.com/rock-128' },
  { nome:'RADIO BOB Classic Rock', qualidade:'MP3 128kbps', url:'https://streams.radiobob.de/bob-classicrock/mp3-128/streams.radiobob.de/' },
  { nome:'RADIO BOB Classic Rock', qualidade:'AAC 64kbps',  url:'https://streams.radiobob.de/bob-classicrock/aac-64/streams.radiobob.de/' },
  { nome:'RADIO BOB National',     qualidade:'MP3 128kbps', url:'https://streams.radiobob.de/bob-national/mp3-128/streams.radiobob.de/' },
  { nome:'STAR FM Classic Rock',   qualidade:'MP3 128kbps', url:'https://stream.starfm.de/classic/mp3-128/stream.starfm.de/' },
  { nome:'STAR FM Classic Rock',   qualidade:'AAC 64kbps',  url:'https://stream.starfm.de/classic/aac-64/stream.starfm.de/' },
  { nome:'STAR FM Country Rock',   qualidade:'MP3 128kbps', url:'https://stream.starfm.de/country/mp3-128/stream.starfm.de/' },
  { nome:'GotRadio Classic Rock',  qualidade:'AAC · HLS',   url:'https://pureplay.cdnstream1.com/6012_64.aac/playlist.m3u8' },
  { nome:'Choice Classic Rock',    qualidade:'MP3 · Stream',url:'http://streamer.radio.co/s66f2626b4/listen.m3u' },
  { nome:'Big R 80s Metal',        qualidade:'MP3 128kbps', url:'http://bigrradio.cdnstream1.com/5186_128' },
  { nome:'Big R 90s Alt Rock',     qualidade:'MP3 128kbps', url:'http://bigrradio.cdnstream1.com/5187_128' },
];

const FEEDS = {
  g1:            'https://g1.globo.com/dynamo/rss2.xml',
  tecnologia:    'https://g1.globo.com/dynamo/tecnologia/rss2.xml',
  agenciabrasil: 'https://agenciabrasil.ebc.com.br/rss.xml',
  cnnbrasil:     'https://www.cnnbrasil.com.br/feed/',
};
// ─────────────────────────────────────────────────────────

// ── MENU DROPDOWN ────────────────────────────────────────
function toggleDD(id) {
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// ── RELÓGIO (dentro do menu) ─────────────────────────────
function atualizarHora() {
  document.getElementById('hora').textContent = new Date().toLocaleTimeString('pt-BR');
}
atualizarHora();
setInterval(atualizarHora, 1000);

// ── CLIMA (Open-Meteo) — faixa única ─────────────────────
const WMO = {
  0:'☀️ Céu limpo', 1:'🌤️ Poucas nuvens', 2:'⛅ Parc. nublado', 3:'☁️ Nublado',
  45:'🌫️ Neblina', 48:'🌫️ Neblina', 51:'🌦️ Garoa leve', 53:'🌦️ Garoa',
  55:'🌦️ Garoa forte', 61:'🌧️ Chuva leve', 63:'🌧️ Chuva', 65:'🌧️ Chuva forte',
  71:'🌨️ Neve leve', 73:'🌨️ Neve', 75:'🌨️ Neve forte', 80:'🌦️ Pancadas',
  81:'🌧️ Pancadas', 82:'⛈️ Pancadas fortes', 95:'⛈️ Tempestade', 96:'⛈️ Tempestade c/ granizo'
};
function descWMO(code) { return WMO[code] || '🌡️ —'; }

async function atualizarClima() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code` +
      `&hourly=temperature_2m,weather_code&timezone=auto`;
    const r = await fetch(url);
    const d = await r.json();
    const cur = d.current;
    document.getElementById('temp').textContent = Math.round(cur.temperature_2m) + '°C';
    document.getElementById('clima-desc').textContent = descWMO(cur.weather_code);
    document.getElementById('clima-vento').textContent = '💨 ' + cur.wind_speed_10m + ' km/h';
    document.getElementById('clima-umidade').textContent = '💧 ' + cur.relative_humidity_2m + '%';

    const agora = new Date();
    const idx = d.hourly.time.findIndex(t => new Date(t) > agora);
    const partes = [];
    for (let i = idx; i < idx + 4 && i < d.hourly.time.length; i++) {
      const h = new Date(d.hourly.time[i]).getHours().toString().padStart(2,'0') + 'h';
      const t = Math.round(d.hourly.temperature_2m[i]) + '°';
      partes.push(`<b>${h}</b> ${t}`);
    }
    document.getElementById('clima-horas').innerHTML = partes.join('  ');
  } catch (e) {
    document.getElementById('clima-desc').textContent = 'erro ao consultar clima';
  }
}
atualizarClima();
setInterval(atualizarClima, 10 * 60 * 1000);

// ── CRIPTO (CoinGecko) ───────────────────────────────────
const MOEDAS = { bitcoin:'BTC', ethereum:'ETH', tether:'USDT', binancecoin:'BNB', solana:'SOL' };
async function atualizarCripto() {
  try {
    const ids = Object.keys(MOEDAS).join(',');
    const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
    const r = await fetch(url);
    const d = await r.json();
    const box = document.getElementById('crypto-container');
    box.innerHTML = '';
    Object.entries(MOEDAS).forEach(([id, sigla]) => {
      const p = d[id];
      if (!p) return;
      const variacao = p.usd_24h_change ?? 0;
      const cor = variacao >= 0 ? 'green' : 'red';
      const seta = variacao >= 0 ? '▲' : '▼';
      box.insertAdjacentHTML('beforeend',
        `<div class="crypto-row"><span>${sigla}</span><span>$${p.usd.toLocaleString('en-US')}
          <span class="${cor}">${seta}${Math.abs(variacao).toFixed(1)}%</span></span></div>`);
    });
  } catch (e) {
    document.getElementById('crypto-container').innerHTML = '<div class="small">erro ao consultar cripto</div>';
  }
}
atualizarCripto();
setInterval(atualizarCripto, 60 * 1000);

// ── NOTÍCIAS (RSS via allorigins + DOMParser) ────────────
let feedAtual = 'g1';
async function atualizarNoticias() {
  const box = document.getElementById('news-container');
  box.innerHTML = '<div class="small">carregando...</div>';
  try {
    const feedUrl = FEEDS[feedAtual];
    const proxied = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feedUrl);
    const r = await fetch(proxied);
    const texto = await r.text();
    const xml = new DOMParser().parseFromString(texto, 'text/xml');
    const itens = Array.from(xml.querySelectorAll('item')).slice(0, 8);
    box.innerHTML = '';
    if (itens.length === 0) throw new Error('feed vazio');
    itens.forEach(item => {
      const titulo = item.querySelector('title')?.textContent || '(sem título)';
      const link = item.querySelector('link')?.textContent || '#';
      box.insertAdjacentHTML('beforeend',
        `<div class="news-item"><div class="news-source">${feedAtual.toUpperCase()}</div>
         <a href="${link}" target="_blank">${titulo}</a></div>`);
    });
  } catch (e) {
    box.innerHTML = '<div class="small">erro ao consultar notícias</div>';
  }
}
function trocarFeedNoticias(chave) {
  feedAtual = chave;
  atualizarNoticias();
}
atualizarNoticias();
setInterval(atualizarNoticias, 10 * 60 * 1000);

// ── RÁDIO — carrega mas não toca sozinho (autoplay é bloqueado sem gesto) ─
let estacaoAtual = 0, tocando = false;
const radio = document.getElementById('radio');
const sel = document.getElementById('select-radio');

ESTACOES.forEach((e,i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = e.nome;
  sel.appendChild(opt);
});

function atualizarUIRadio() {
  document.getElementById('radio-nome').textContent = ESTACOES[estacaoAtual].nome;
  sel.value = estacaoAtual;
}

function carregarEstacao(idx, autoplay) {
  estacaoAtual = (idx + ESTACOES.length) % ESTACOES.length;
  radio.src = ESTACOES[estacaoAtual].url;
  radio.load();
  atualizarUIRadio();
  if (autoplay) {
    tocando = true;
    radio.play().catch(()=>{ setStatus('erro'); });
    setStatus('amarelo');
  } else {
    tocando = false;
    setStatus('parado');
  }
}

function proxima()  { carregarEstacao(estacaoAtual+1, tocando); }
function anterior() { carregarEstacao(estacaoAtual-1, tocando); }
function trocarPorSelect(idx) { carregarEstacao(parseInt(idx), tocando); }

function togglePlay() {
  if (radio.paused) {
    tocando = true;
    if (!radio.src) radio.src = ESTACOES[estacaoAtual].url;
    radio.play().catch(()=>{ setStatus('erro'); });
    document.getElementById('btn-play').textContent = '⏸';
    document.getElementById('btn-play').classList.add('tocando');
  } else {
    tocando = false;
    radio.pause();
    document.getElementById('btn-play').textContent = '▶';
    document.getElementById('btn-play').classList.remove('tocando');
    setStatus('parado');
  }
}

function setStatus(estado) {
  const dot = document.getElementById('radio-dot');
  dot.className = 'radio-dot' + (estado === 'verde' ? ' tocando' : estado === 'erro' ? ' erro' : '');
}

radio.addEventListener('playing', () => {
  setStatus('verde');
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').classList.add('tocando');
  tocando = true;
});
radio.addEventListener('error', () => {
  setStatus('erro');
  setTimeout(()=>{ if (tocando) carregarEstacao(estacaoAtual, true); }, 8000);
});
radio.addEventListener('stalled', () => {
  if (!tocando) return;
  setStatus('amarelo');
  setTimeout(()=>{ if (tocando) carregarEstacao(estacaoAtual, true); }, 5000);
});
setInterval(()=>{
  if (tocando && (radio.paused || radio.readyState === 0)) {
    carregarEstacao(estacaoAtual, true);
  }
}, 30000);

carregarEstacao(0, false); // carrega mas não toca
</script>
</body>
</html>
